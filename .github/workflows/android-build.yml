name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Run Lint
      run: gradle lintDebug

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Run Unit Tests
      run: gradle testDebugUnitTest

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: app/build/reports/tests/testDebugUnitTest/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > zbrowser-release.jks
        echo "KEYSTORE_FILE=zbrowser-release.jks" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Build Signed Release APK
      run: gradle assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release and Upload APKs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        # M8 FIX: Version tag now matches app version (4.0)
        tag_name: v4.0.${{ github.run_number }}
        name: ZBrowser v4.0.${{ github.run_number }}
        body: |
          ## ZBrowser v4.0 - Production-Ready Android Browser

          Built from commit: ${{ github.sha }}

          ### v4.0 Bug Fixes & Improvements
          - **CRITICAL**: Fixed WebViewPool.init() compilation error
          - **CRITICAL**: Fixed AdBlocker CSS injection JavaScript syntax error
          - **CRITICAL**: Fixed WebViewPool release/destroy order (memory leak)
          - **CRITICAL**: Fixed onTrimMemory blank screen after memory pressure
          - **HIGH**: Fixed closeTab order-of-operations bug
          - **HIGH**: Fixed handleNewWindow bare WebView (now uses full features)
          - **HIGH**: Fixed restoreTabs nextTabId collision
          - **HIGH**: Fixed animateProgress race condition
          - **HIGH**: Removed fallbackToDestructiveMigration (data loss prevention)
          - **HIGH**: CrashReporter init now runs before WebViewPool
          - **MEDIUM**: PermissionManager supports concurrent requests
          - **MEDIUM**: Bookmarks/History dialogs show URL for disambiguation
          - **MEDIUM**: Added file upload support (<input type="file">)
          - **MEDIUM**: Fixed BookmarkEntity primary key (URL-based, no duplicate issue)
          - **MEDIUM**: CrashReporter writes on separate thread
          - **LOW**: Close All tabs confirmation dialog
          - **LOW**: Exit confirmation on back press
          - **LOW**: Added proguard keep for BuildConfig

          ### Downloads
          - **ZBrowser-debug.apk** - Debug build for testing
          - **ZBrowser-release.apk** - Signed release build
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
