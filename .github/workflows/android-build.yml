name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release and Upload APKs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.1.${{ github.run_number }}
        name: ZBrowser v1.1.${{ github.run_number }}
        body: |
          ## ZBrowser - Android WebView Browser

          Built from commit: ${{ github.sha }}

          ### Downloads
          - **ZBrowser-debug.apk** - Debug build for testing
          - **ZBrowser-release.apk** - Release build (ProGuard optimized)
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
