name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: true
    - name: Run Android Lint
      run: gradle lintDebug
    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: true

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > zbrowser-release.jks
        echo "KEYSTORE_FILE=zbrowser-release.jks" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Build Signed Release APK
      run: gradle assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release and Upload APKs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: ZBrowser v2.0.${{ github.run_number }}
        body: |
          ## ZBrowser - Android WebView Browser

          Built from commit: ${{ github.sha }}

          ### What's New in v2.0
          - 🏗️ **Architecture overhaul**: Split monolithic MainActivity into modular components (TabManager, NavigationController, SettingsRepository, BrowserWebViewFactory)
          - 🔒 **Security fixes**: Disabled cleartext traffic, removed intent:// handler (prevents package enumeration), HTML-escaped error pages (fixes XSS)
          - ⚡ **Performance**: Tab freezing for memory optimization, throttled progress updates
          - 📑 **Tab management**: Direct WebView references replace fragile index coupling, state preservation across config changes
          - 🌐 **Network security**: Added network_security_config.xml, HTTPS-only by default
          - 🎨 **UX**: SSL icon shows only for HTTPS, TabLayout appears with 2+ tabs, bookmark toggle (add/remove)
          - 📖 **Bookmarks**: Full CRUD with JSON storage, delete individual bookmarks or clear all

          ### Downloads
          - **ZBrowser-debug.apk** - Debug build for testing
          - **ZBrowser-release.apk** - Signed release build (ProGuard optimized, installable!)
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
