name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Run Lint
      run: gradle lintDebug

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Run Unit Tests
      run: gradle testDebugUnitTest

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: app/build/reports/tests/testDebugUnitTest/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        validate-wrappers: false

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > zbrowser-release.jks
        echo "KEYSTORE_FILE=zbrowser-release.jks" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Build Signed Release APK
      run: gradle assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ZBrowser-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release and Upload APKs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v4.1.1.${{ github.run_number }}
        name: ZBrowser v4.1.1.${{ github.run_number }}
        body: |
          ## ZBrowser v4.1.1 - Aura Browser UI Redesign

          Built from commit: ${{ github.sha }}

          ### v4.1.1 UI Transformation
          - **MAJOR**: Complete UI redesign with Jetpack Compose
          - **MAJOR**: New "Aura Browser" design language
          - **MAJOR**: Apple-inspired color scheme (#F5F5F7 + Purple accents)
          - **MAJOR**: Pill-shaped search bar (44dp height, 26dp radius)
          - **MAJOR**: Slide-in purple navigation bar from right edge
          - **MAJOR**: Circular tab icons (38dp) with active indicators
          - **MAJOR**: Animated purple gradient progress bar (2dp)
          - **MAJOR**: Suggestions panel with Recent/Trending/Suggestions sections
          - **MAJOR**: Pulsing edge indicator for swipe gesture
          - **MAJOR**: Bottom sheet menu with 4x2 grid layout
          - **MAJOR**: Responsive tablet layout (≥500dp width)
          - **HIGH**: Smooth animations (600ms progress, 350ms nav bar slide)
          - **HIGH**: Gesture-based navigation (right-edge swipe)
          - **HIGH**: Material 3 theming with custom color palette
          - **HIGH**: Typography system matching design specs
          - **MEDIUM**: All existing browser features preserved
          - **MEDIUM**: WebView pool, ad blocker, tab management intact
          - **MEDIUM**: Hilt dependency injection maintained
          - **MEDIUM**: Room database for bookmarks/history

          ### Downloads
          - **ZBrowser-debug.apk** - Debug build for testing
          - **ZBrowser-release.apk** - Signed release build
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
